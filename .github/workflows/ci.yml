name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Generate, test, build
        run: |
          npm test
          npm run build
      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: liquidfloodie-dist
          path: dist/
