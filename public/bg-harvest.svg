<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="45%" stop-color="#ffedd5"/>
      <stop offset="100%" stop-color="#fef3c7"/>
    </linearGradient>
    <linearGradient id="leaf" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#65a30d"/>
      <stop offset="100%" stop-color="#3f6212"/>
    </linearGradient>
    <linearGradient id="berry" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f43f5e"/>
      <stop offset="100%" stop-color="#be123c"/>
    </linearGradient>
    <linearGradient id="citrus" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fb923c"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fdba74" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#sky)"/>

  <!-- soft wash orbs -->
  <circle cx="200" cy="160" r="180" fill="#fde68a" opacity="0.35"/>
  <circle cx="1400" cy="200" r="220" fill="#fecdd3" opacity="0.3"/>
  <circle cx="900" cy="780" r="260" fill="#bbf7d0" opacity="0.28"/>

  <!-- leafy cluster left -->
  <g opacity="0.22" transform="translate(80,520)">
    <ellipse cx="60" cy="80" rx="90" ry="40" fill="url(#leaf)" transform="rotate(-30 60 80)"/>
    <ellipse cx="120" cy="50" rx="80" ry="36" fill="url(#leaf)" transform="rotate(20 120 50)"/>
    <ellipse cx="40" cy="40" rx="70" ry="30" fill="#84cc16" transform="rotate(-10 40 40)"/>
  </g>

  <!-- berries right -->
  <g opacity="0.2" transform="translate(1280,480)">
    <circle cx="40" cy="40" r="28" fill="url(#berry)"/>
    <circle cx="90" cy="55" r="24" fill="url(#berry)"/>
    <circle cx="65" cy="90" r="26" fill="#e11d48"/>
    <circle cx="120" cy="30" r="18" fill="#fb7185"/>
  </g>

  <!-- citrus top-left -->
  <g opacity="0.18" transform="translate(180,80)">
    <circle cx="70" cy="70" r="60" fill="url(#citrus)"/>
    <circle cx="70" cy="70" r="48" fill="none" stroke="#fff7ed" stroke-width="3" opacity="0.5"/>
  </g>

  <!-- avocado silhouette -->
  <g opacity="0.16" transform="translate(1100,120)">
    <ellipse cx="70" cy="90" rx="55" ry="75" fill="#65a30d"/>
    <circle cx="70" cy="100" r="22" fill="#a16207"/>
  </g>

  <!-- blender / smoothie glass center-bottom -->
  <g opacity="0.14" transform="translate(700,520)">
    <path d="M40 40 L160 40 L145 180 Q100 210 55 180 Z" fill="url(#glass)"/>
    <ellipse cx="100" cy="40" rx="60" ry="14" fill="#fed7aa"/>
    <rect x="120" y="10" width="10" height="50" rx="4" fill="#fff7ed" transform="rotate(12 125 35)"/>
  </g>

  <!-- scattered seeds / dots -->
  <g fill="#c2410c" opacity="0.12">
    <circle cx="400" cy="300" r="6"/><circle cx="450" cy="340" r="4"/>
    <circle cx="520" cy="280" r="5"/><circle cx="1000" cy="360" r="6"/>
    <circle cx="1050" cy="400" r="4"/><circle cx="600" cy="200" r="5"/>
    <circle cx="780" cy="150" r="4"/><circle cx="300" cy="600" r="5"/>
  </g>

  <!-- soft vignette -->
  <rect width="1600" height="900" fill="url(#sky)" opacity="0.15"/>
</svg>
